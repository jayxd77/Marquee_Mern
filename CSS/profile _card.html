<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>profile card</title>

    <style>
        *{
            align-items: center;
        }
        body{
            min-height: 100vh;
            justify-content: center;
            align-items: center;
            display: flex;
        }

        .profile_card{
            /* height: auto; */
            height: 500px;
            width: 400px;
            background-color: white;
            position: relative;
            border-radius: 25px;
            /* border:1px solid ; */
            overflow: hidden;
            box-shadow: 10px 15px 35px  rgba(0, 0, 0, 0.2);
            
        }

        .top{
            background-color: rgba(0, 0, 255, 0.662);
            position: relative;
            height: 155px;
        }

        #profile-pic{
        width: 135px;
        height: 135px;
        position: absolute;
        left: 50%;
        top: 75px;
        transform: translateX(-50%);
        border-radius: 50%;
        border: 4px solid white;
        outline: 3px solid #2864df;
        object-fit: cover;
        background: #ddd;
        }


        .info{
            text-align: center;
            padding-top: 75px;
        }
         
        .socials{
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
            padding-top: 5px;
        }

        .socials img{
            width: 35px;
            height: 35x;
            border-radius: 50%;
            justify-content: center;
        }

        .socials img:hover{
            transform: scale(1.2);
            transition: 0.3s;
            box-shadow: 5px 5px 10px rgb(2, 73, 250);
        }

        .button{
            display: flex;
            justify-content: center;
            gap: 20px;
        } 

        .button button{
            background-color: rgba(25, 0, 255, 0.689);
            border-radius: 50px;
            padding: 13px;
            color: white;
            width: 130px;
        }

        .likes{
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .likes img{
            width: 20px;
            height: 20px;
        }

        

    </style>
</head>
<body>
    <div class="profile_card">
        <div class="top">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTK9a9fCxtvNDFhh3fx10P2jAaFVt7nE8a_Jpip6qPYQQ&s=10" alt="" id="profile-pic">
        </div>

        <div class="info">
            <h2>CodingLab</h2>
            <p>Youtuber & Blogger</p>
        </div>

        <div class="socials">
        <img src="https://cdn-icons-png.flaticon.com/128/5968/5968764.png" alt="facebook">
        <img src="https://cdn-icons-png.flaticon.com/128/5969/5969020.png" alt="twitter"> 
        <img src="https://cdn-icons-png.flaticon.com/128/3955/3955024.png" alt="instagram">
        <img src="https://cdn-icons-png.flaticon.com/128/3670/3670147.png" alt="youtube">
        </div>

        <div class="button">
            <button>Subscribe</button>
            <button>Message</button>
        </div>

        <div class="likes">
            <img src="https://cdn-icons-png.flaticon.com/128/1077/1077035.png" alt="">  60.4k | 
            <img src="https://cdn-icons-png.flaticon.com/128/2462/2462719.png" alt=""> 20k |
            <img src="https://cdn-icons-png.flaticon.com/128/2958/2958783.png" alt=""> 12.4k
        </div>
    </div>
</body>
</html>
