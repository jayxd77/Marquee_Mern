<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>CSS Position Demo</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            min-height: 200vh;
        }

        .box-container {
            position: relative;
            min-height: 1500px;
            padding: 20px;
            background-color: #eeeeee;
        }

        .box1 {
            width: 50%;
            height: 150px;

            position: relative;
            top: 50px;
            left: 60px;

            background-color: #3498db;
            color: white;

            display: flex;
            align-items: center;
            justify-content: center;
        }


        .box2 {
            width: 200px;
            height: 150px;

            position: absolute;
            top: 50px;
            right: 20%;

            background-color: #e67e22;
            color: white;

            display: flex;
            align-items: center;
            justify-content: center;
        }


        .box3 {
            width: 150px;
            height: 150px;

            position: sticky;
            top: 0;

            margin-top: 100px;

            overflow: hidden;
            border: 3px solid black;
        }

        .box3 img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .box4 {
            width: 150px;
            height: 150px;

            position: fixed;
            bottom: 20px;
            right: 20px;

            background-color: #2ecc71;
            color: white;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

            padding: 10px;
        }

        .box4 img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            margin-top: 10px;
        }

    </style>
</head>


<body>

    <div class="box-container">

        <div class="box1">
            Relative
        </div>

        <div class="box2">
            Absolute
        </div>

        <div class="box3">
            <img
                src="https://images.seeklogo.com/logo-png/45/1/google-messages-logo-png_seeklogo-456657.png"
                alt="">
        </div>
