<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        td,th{
            border: 1px solid;
            padding: 5px;
        }
        table{
            border-collapse: collapse;
        }
    </style>
    
</head>
<body>
    <form action="">
        <table border="1">
            <tr>
                <th colspan="2">Invoice #123456789</th>
                <th colspan="2">14 January 2025</th>
            </tr>
            <tr>
               <td colspan="2">
                <p><b>Pay to:</b><br>
                Acme Billing <br>
                123 Main street <br>
                cityVille, NA 1234</p>
               </td>
               <td colspan="2">
                <p><b>Customer:</b><br>
                John Smith <br>
                321 Willow Way <br>
                Southeast Nortwesternshire. MA 54321</p>
               </td>
            </tr>

            <tr>
                <td>Name/description</td>
                <td>Qty.</td>
                <td>@</td>
                <td>Cost</td>
            </tr>
            <tr>
                <td>Paperclips</td>
                <td>1000</td>
                <td>0.01</td>
                <td>10.00</td>
            </tr>
            <tr>
                <td>Staples(box)</td>
                <td>1000</td>
                <td>1.00</td>
                <td>100.00</td>
            </tr>
            <tr>
                <td colspan="3" align="right"><b>Subtotal</b></td>
                <td>110.00</td>
            </tr>
            <tr>
                <td colspan="2" align="right"><b>Tax</b></td>
                <td>8%</td>
                <td>8.80</td>
            </tr>
            <tr>
                <td colspan="3" align="right"><b>Grand Total</b></td>
                <td><b>$118.80</b></td>
            </tr>
        </table>
    </form>
</body>
</html>
